<script>
        function renderRecords(records) {
            var listEl = document.getElementById('recordList');
            listEl.innerHTML = '';

            records.forEach(function (rec) {
                var icon = CATEGORY_ICONS[rec.category] || '📦';
                var colorIdx = Object.keys(CATEGORY_ICONS).indexOf(rec.category);
                var bgColor = COLORS[colorIdx >= 0 ? colorIdx % COLORS.length : 0];
                var rowIndex = rec.rowIndex || 0;

                var li = document.createElement('li');
                li.className = 'record-item';
                li.style.cursor = 'pointer';
                li.setAttribute('data-row', rowIndex);

                // 表示行
                var displayDiv = document.createElement('div');
                displayDiv.style.cssText = 'display:flex; align-items:center; width:100%; gap:10px;';
                displayDiv.innerHTML =
                    '<div class="record-icon" style="background: ' + bgColor + '22">' + icon + '</div>' +
                    '<div class="record-info" style="flex:1; min-width:0; word-break:break-word;">' +
                    '  <div class="record-memo">' + escapeHtml(rec.memo) + '</div>' +
                    '  <div class="record-meta">' + escapeHtml(rec.date) + ' · ' + escapeHtml(rec.category) + ' · ' + escapeHtml(rec.method || '') + '</div>' +
                    '</div>' +
                    '<div class="record-amount ' + (rec.type === '収入' ? 'income' : 'expense') + '" style="white-space:nowrap;">' +
                    (rec.type === '収入' ? '+' : '-') + '¥' + rec.amount.toLocaleString() +
                    '</div>' +
                    '<div style="font-size:0.7rem; color:var(--text-muted); margin-left:4px; flex-shrink:0;">✏️</div>';

                // 編集フォーム（初期は非表示）
                var editDiv = document.createElement('div');
                editDiv.className = 'record-edit-form';
                editDiv.style.cssText = 'display:none; width:100%; padding:10px 0 4px;';

                // カテゴリ一覧（未分類を必ず含む）
                var catOptions = (currentSettings.categories || '未分類,食費,日用品,交通費,娯楽,医療,衣服,通信費').split(',').map(function (c) { return c.trim(); });
                if (catOptions.indexOf('未分類') < 0) catOptions.unshift('未分類');
                if (catOptions.indexOf('返金') < 0) catOptions.push('返金');

                // カテゴリチップを生成
                var chipsHtml = '<div style="margin-bottom:6px; font-size:0.7rem; color:var(--text-muted);">🏷️ カテゴリを選択</div>';
                chipsHtml += '<div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;">';
                catOptions.forEach(function (cat) {
                    var isActive = cat === rec.category;
                    var chipIcon = CATEGORY_ICONS[cat] || '📦';
                    chipsHtml += '<button class="cat-chip" data-cat="' + escapeHtml(cat) + '" style="' +
                        '-webkit-appearance:none; font-size:0.75rem; padding:5px 10px; border-radius:16px; cursor:pointer; ' +
                        'border:' + (isActive ? '2px solid var(--accent)' : '1px solid var(--border-card)') + '; ' +
                        'background:' + (isActive ? 'var(--accent)' : 'transparent') + '; ' +
                        'color:' + (isActive ? '#fff' : 'var(--text-primary)') + '; ' +
                        'font-weight:' + (isActive ? '700' : '400') + ';">' +
                        chipIcon + ' ' + escapeHtml(cat) + '</button>';
                });
                chipsHtml += '</div>';

                // メモ編集行（min-width削除、word-break追加）
                chipsHtml += '<div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:10px;">' +
                    '<label style="flex: 0 0 auto; font-size:0.7rem; color:var(--text-muted); white-space:nowrap;">✏️ 品名:</label>' +
                    '<input type="text" class="edit-memo-input input-field" value="' + escapeHtml(rec.memo) + '" ' +
                    'style="flex: 1 1 0; min-width:0; font-size:0.8rem; padding:6px 8px;" ' +
                    'onkeydown="if(event.key===\'Enter\'){event.preventDefault();}">' +
                    '</div>';

                // 保存ボタン（カテゴリ・品名を一括保存）
                chipsHtml += '<button class="edit-save-btn" style="' +
                    '-webkit-appearance:none; width:100%; font-size:0.8rem; padding:8px; border-radius:16px; border:none; ' +
                    'background:var(--accent); color:#fff; cursor:pointer; font-weight:700;">保存</button>';

                editDiv.innerHTML = chipsHtml;

                li.appendChild(displayDiv);
                li.appendChild(editDiv);

                // クリックで編集フォームをトグル
                displayDiv.addEventListener('click', function () {
                    var wasVisible = editDiv.style.display !== 'none';
                    document.querySelectorAll('.record-edit-form').forEach(function (f) { f.style.display = 'none'; });
                    if (!wasVisible) editDiv.style.display = 'block';
                });

                // カテゴリチップのクリック → 視覚的選択のみ（即保存しない）
                (function (ri, ed, recObj) {
                    var currentCat = recObj.category;

                    ed.querySelectorAll('.cat-chip').forEach(function (chip) {
                        chip.addEventListener('click', function (e) {
                            e.stopPropagation();
                            currentCat = this.getAttribute('data-cat');
                            ed.querySelectorAll('.cat-chip').forEach(function (c) {
                                c.style.border = '1px solid var(--border-card)';
                                c.style.background = 'transparent';
                                c.style.color = 'var(--text-primary)';
                                c.style.fontWeight = '400';
                            });
                            this.style.border = '2px solid var(--accent)';
                            this.style.background = 'var(--accent)';
                            this.style.color = '#fff';
                            this.style.fontWeight = '700';
                        });
                    });

                    // 保存ボタン → カテゴリ＋品名を一括保存
                    var saveBtn = ed.querySelector('.edit-save-btn');
                    saveBtn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        var newMemo = ed.querySelector('.edit-memo-input').value.trim();
                        var catChanged = currentCat !== recObj.category;
                        var memoChanged = newMemo !== recObj.memo;

                        if (!catChanged && !memoChanged) {
                            showToast('変更がありません');
                            return;
                        }

                        if (!GAS_API_URL) {
                            showToast('✅ (モック) 変更を保存しました');
                            return;
                        }

                        var btn = this;
                        btn.textContent = '保存中...';
                        btn.disabled = true;

                        var params = { rowIndex: ri };
                        if (catChanged) params.category = currentCat;
                        if (memoChanged) params.memo = newMemo;

                        callGAS('updateRecord', params)
                            .then(function (result) {
                                btn.textContent = '保存';
                                btn.disabled = false;
                                if (result.success) {
                                    showToast('✅ 変更を保存しました');
                                    if (catChanged) {
                                        recObj.category = currentCat;
                                        var newIcon = CATEGORY_ICONS[currentCat] || '📦';
                                        displayDiv.querySelector('.record-icon').innerHTML = newIcon;
                                        displayDiv.querySelector('.record-meta').textContent = recObj.date + ' · ' + currentCat + ' · ' + (recObj.method || '');
                                    }
                                    if (memoChanged) {
                                        recObj.memo = newMemo;
                                        displayDiv.querySelector('.record-memo').textContent = newMemo;
                                    }
                                    editDiv.style.display = 'none';
                                    setTimeout(function () { loadData(currentYear, currentMonth); }, 800);
                                } else {
                                    showToast('❌ ' + result.message, true);
                                }
                            })
                            .catch(function () {
                                btn.textContent = '保存';
                                btn.disabled = false;
                                showToast('❌ 通信エラー', true);
                            });
                    });
                })(rowIndex, editDiv, rec);

                listEl.appendChild(li);
            });

            showCard('recordsCard');
        }

</script>
